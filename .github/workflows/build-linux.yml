name: Build Linux

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-linux-x64:
    name: Build · Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm libarchive-tools

      - name: Pre-build optimization
        run: npm run prebuild-optimize

      - name: Build (Linux x64)
        run: npm run build:linux -- --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-build optimization
        run: |
          npm run optimize
          npm run remove-console

      - name: List dist
        run: ls -lh dist/

      - name: Upload Linux x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: warn
          retention-days: 7

  build-linux-arm64:
    name: Build · Linux (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm libarchive-tools ruby ruby-dev build-essential
          sudo gem install fpm --no-document

      - name: Pre-build optimization
        run: npm run prebuild-optimize

      - name: Build (Linux arm64)
        run: npm run build:linux -- --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_SYSTEM_FPM: true

      - name: Post-build optimization
        run: |
          npm run optimize
          npm run remove-console

      - name: List dist
        run: ls -lh dist/

      - name: Upload Linux arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-arm64
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: warn
          retention-days: 7
