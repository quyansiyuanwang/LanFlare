name: Build macOS

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build · macOS (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Pre-build optimization
        run: npm run prebuild-optimize

      - name: Build (macOS arm64)
        run: npm run build:mac -- --arm64 --dir --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-build optimization
        run: |
          npm run optimize
          npm run remove-console

      - name: Ad-hoc sign (macOS arm64)
        run: |
          echo "=== Creating Ad-hoc signature for macOS app ==="
          APP_PATH=$(find dist -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found in dist/"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          echo "Signing all executables and frameworks..."
          find "$APP_PATH/Contents" -type f \( -perm +111 -o -name "*.dylib" -o -name "*.so" \) -print0 | while IFS= read -r -d '' file; do
            echo "Signing: $file"
            codesign --sign - --force "$file" 2>&1 || true
          done

          echo "Signing frameworks..."
          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -type d 2>/dev/null | while read framework; do
            echo "Signing framework: $framework"
            codesign --sign - --force "$framework" 2>&1 || true
          done

          echo "Signing main app bundle with deep signature..."
          codesign --sign - --deep --force "$APP_PATH"

          echo "Verifying signature..."
          codesign --verify --verbose "$APP_PATH"

          echo "Displaying signature info..."
          codesign --display --verbose=4 "$APP_PATH"

          echo "Checking for _CodeSignature directory..."
          ls -la "$APP_PATH/Contents/" | grep -i code || echo "Warning: _CodeSignature not found"

      - name: Create DMG and ZIP (macOS arm64)
        run: |
          APP_PATH=$(find dist -name "*.app" -type d | head -n 1)
          APP_NAME=$(basename "$APP_PATH")

          echo "Creating ZIP archive..."
          cd "$(dirname "$APP_PATH")"
          ditto -c -k --keepParent "$APP_NAME" "../LanFlare-1.0.0-macOS-arm64.zip"
          cd -

          echo "Installing create-dmg..."
          npm install --global create-dmg

          echo "Creating DMG..."
          cd "$(dirname "$APP_PATH")"
          create-dmg "$APP_NAME" . || true
          mv *.dmg "../LanFlare-1.0.0-macOS-arm64.dmg" || true
          cd -

      - name: List dist
        run: ls -lh dist/

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
          retention-days: 7

  build-macos-x64:
    name: Build · macOS (x64)
