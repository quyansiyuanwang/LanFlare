name: Build macOS

on:
  workflow_call:
    inputs:
      version:
        description: 'Version tag'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build · macOS (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (macOS arm64)
        run: npm run build:mac -- --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign (macOS arm64)
        run: |
          for app in dist/mac-arm64/*.app; do
            if [ -d "$app" ]; then
              echo "Ad-hoc signing: $app"
              codesign --force --deep --sign - "$app"
            fi
          done

      - name: List dist
        run: ls -lh dist/

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.pkg
          if-no-files-found: warn
          retention-days: 7

  build-macos-x64:
    name: Build · macOS (x64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (macOS x64)
        run: npm run build:mac -- --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign (macOS x64)
        run: |
          for app in dist/mac/*.app; do
            if [ -d "$app" ]; then
              echo "Ad-hoc signing: $app"
              codesign --force --deep --sign - "$app"
            fi
          done

      - name: List dist
        run: ls -lh dist/

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.pkg
          if-no-files-found: warn
          retention-days: 7
