name: Build Windows

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    name: Build · Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Pre-build optimization
        run: npm run prebuild-optimize

      - name: Build (Windows)
        run: npm run build:win -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-build optimization
        run: |
          npm run optimize
          npm run remove-console

      - name: List dist
        run: Get-ChildItem -Path dist -Recurse -File | Select-Object FullName, Length

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn
          retention-days: 7
