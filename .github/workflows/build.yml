name: Build & Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v1.2.0). Leave empty to just build without releasing."
        required: false
        default: ""
      build_windows:
        description: "Build Windows"
        type: boolean
        default: true
      build_macos:
        description: "Build macOS"
        type: boolean
        default: true
      build_linux:
        description: "Build Linux"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows
    if: github.event_name == 'push' || github.event_name == 'pull_request' || inputs.build_windows
    uses: ./.github/workflows/build-windows.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (startsWith(github.ref, 'refs/tags/') && github.ref_name || '') }}

  # ─────────────────────────────────────────
  build-macos:
    name: Build macOS
    if: github.event_name == 'push' || github.event_name == 'pull_request' || inputs.build_macos
    uses: ./.github/workflows/build-macos.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (startsWith(github.ref, 'refs/tags/') && github.ref_name || '') }}

  # ─────────────────────────────────────────
  build-linux:
    name: Build Linux
    if: github.event_name == 'push' || github.event_name == 'pull_request' || inputs.build_linux
    uses: ./.github/workflows/build-linux.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (startsWith(github.ref, 'refs/tags/') && github.ref_name || '') }}

  # ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')

    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: artifacts/windows

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: artifacts/macos-arm64

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-x64
          path: artifacts/macos-x64

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux-x64
          path: artifacts/linux-x64

      - name: Download Linux arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux-arm64
          path: artifacts/linux-arm64

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: LanFlare ${{ steps.tag.outputs.tag }}
          draft: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            artifacts/windows/*
            artifacts/macos-arm64/*
            artifacts/macos-x64/*
            artifacts/linux-x64/*
            artifacts/linux-arm64/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
