name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.2.0). Leave empty to just build without releasing.'
        required: false
        default: ''
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows
    if: github.event_name == 'push' || inputs.build_windows
    uses: ./.github/workflows/build-windows.yml
    permissions:
      contents: write
    secrets: inherit

  # ─────────────────────────────────────────
  build-macos:
    name: Build macOS
    if: github.event_name == 'push' || inputs.build_macos
    uses: ./.github/workflows/build-macos.yml
    permissions:
      contents: write
    secrets: inherit

  # ─────────────────────────────────────────
  build-linux:
    name: Build Linux
    if: github.event_name == 'push' || inputs.build_linux
    uses: ./.github/workflows/build-linux.yml
    permissions:
      contents: write
    secrets: inherit

  # ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')) &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows artifacts
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: artifacts/windows

      - name: Download macOS arm64 artifacts
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: artifacts/macos-arm64

      - name: Download macOS x64 artifacts
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: release-macos-x64
          path: artifacts/macos-x64

      - name: Download Linux x64 artifacts
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: release-linux-x64
          path: artifacts/linux-x64

      - name: Download Linux arm64 artifacts
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: release-linux-arm64
          path: artifacts/linux-arm64

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: LanFlare ${{ steps.tag.outputs.tag }}
          draft: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            artifacts/windows/*
            artifacts/macos-arm64/*
            artifacts/macos-x64/*
            artifacts/linux-x64/*
            artifacts/linux-arm64/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
