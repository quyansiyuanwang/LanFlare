name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.2.0). Leave empty to just build without releasing.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  build-windows:
    name: Build · Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Windows)
        run: npm run build:win -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist
        run: Get-ChildItem -Path dist -Recurse -File | Select-Object FullName, Length

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn
          retention-days: 7

  # ─────────────────────────────────────────
  build-macos-arm64:
    name: Build · macOS (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (macOS arm64)
        run: npm run build:mac -- --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist
        run: ls -lh dist/

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.pkg
          if-no-files-found: warn
          retention-days: 7

  # ─────────────────────────────────────────
  build-macos-x64:
    name: Build · macOS (x64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (macOS x64)
        run: npm run build:mac -- --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist
        run: ls -lh dist/

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.pkg
          if-no-files-found: warn
          retention-days: 7

  # ─────────────────────────────────────────
  build-linux-x64:
    name: Build · Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm libarchive-tools

      - name: Build (Linux x64)
        run: npm run build:linux -- --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist
        run: ls -lh dist/

      - name: Upload Linux x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: warn
          retention-days: 7

  # ─────────────────────────────────────────
  build-linux-arm64:
    name: Build · Linux (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm libarchive-tools ruby ruby-dev build-essential
          sudo gem install fpm --no-document

      - name: Build (Linux arm64)
        run: npm run build:linux -- --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_SYSTEM_FPM: true

      - name: List dist
        run: ls -lh dist/

      - name: Upload Linux arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-arm64
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: warn
          retention-days: 7

  # ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos-arm64, build-macos-x64, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')

    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: artifacts/windows

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: artifacts/macos-arm64

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-x64
          path: artifacts/macos-x64

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux-x64
          path: artifacts/linux-x64

      - name: Download Linux arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux-arm64
          path: artifacts/linux-arm64

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: LanFlare ${{ steps.tag.outputs.tag }}
          draft: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            artifacts/windows/*
            artifacts/macos-arm64/*
            artifacts/macos-x64/*
            artifacts/linux-x64/*
            artifacts/linux-arm64/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
